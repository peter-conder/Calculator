<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css"> 
</head>
<body>
    <h1 id="title">Calculator</h1>
    <div class="calcBody">
        <div class="displayContainer">
            <span class="display"></span>
        </div>
        <div class="buttons">
            <div class="row1">
                <button id="one" data-value="1" class="notEnter digit">1</button>
                <button id="two" data-value="2" class="notEnter digit">2</button>
                <button id="three" data-value="3" class="notEnter digit">3</button>
                <button id="plus" data-value="+" class="notEnter">+</button>
            </div>
            <div class="row2">
                <button id="four" data-value="4" class="notEnter digit">4</button>
                <button id="five" data-value="5" class="notEnter digit">5</button>
                <button id="six" data-value="6" class="notEnter digit">6</button>
                <button id="minus" data-value="-"class="notEnter" >-</button>
                </div>
            <div class="row3">
                <button id="seven" data-value="7" class="notEnter digit"> 7</button>
                <button id="eight" data-value="8" class="notEnter digit"> 8</button>
                <button id="nine" data-value="9" class="notEnter digit">9</button>
                <button id="multiply" data-value="*" class="notEnter">*</button>
                </div>
            <div class="row4">
                <button id="zero" data-value="0" class="notEnter digit">0</button>
                <button id="enter" data-value="=" >Enter</button>
                <button id="divide" data-value="/"class="notEnter">/</button>
            </div>
            <div class="clear">
                <button class="clearButton">Clear</button>
            </div>
        </div>
    </div>
</body>
</html>
